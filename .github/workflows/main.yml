name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

# 關鍵：加入權限設定，解決自動化部署失敗的問題
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🏗️ Build Web
        # 確保 base-href 的大小寫與 GitHub 倉庫路徑完全一致
        run: flutter build web --release --base-href /SoraTalk-V2/

      - name: 🚀 Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages